---
# ============================================================
# ServiceMonitor — tells Prometheus to scrape ecommerce metrics
# Requires: kube-prometheus-stack CRDs
# ============================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ecommerce-monitor
  namespace: monitoring
  labels:
    release: prometheus    # must match kube-prometheus-stack release name
spec:
  namespaceSelector:
    matchNames:
      - ecommerce
  selector:
    matchLabels:
      app: ecommerce
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
