---
# ============================================================
# Deployment — E-Commerce Frontend / API
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  namespace: ecommerce
  labels:
    app: ecommerce
    tier: frontend
    version: "1.0.0"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "3000"
spec:
  replicas: 2  # HPA will scale this up; 2 ensures high-availability baseline
  selector:
    matchLabels:
      app: ecommerce
      tier: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0         # Zero-downtime rolling updates
  template:
    metadata:
      labels:
        app: ecommerce
        tier: frontend
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3000"
    spec:
      # ---- Security ----
      serviceAccountName: ecommerce-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # ---- Topology Spread — spread pods across nodes ----
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: ecommerce

      # ---- Graceful shutdown ----
      terminationGracePeriodSeconds: 60

      containers:
        - name: ecommerce
          # REPLACE with your actual image and tag
          image: your-dockerhub-username/ecommerce-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # ---- Security Context (container-level) ----
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # ---- Environment from ConfigMap & Secret ----
          envFrom:
            - configMapRef:
                name: ecommerce-config
            - secretRef:
                name: ecommerce-secrets

          # ---- Resource Requests & Limits ----
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ---- Liveness Probe — restart if unhealthy ----
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          # ---- Readiness Probe — only send traffic when ready ----
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          # ---- Startup Probe — allow slow-starting containers ----
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 12
            periodSeconds: 10

          # ---- Writable tmp volume (for read-only root fs) ----
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache

      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}

---
# ============================================================
# ServiceAccount — least-privilege identity for the app
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecommerce-sa
  namespace: ecommerce
  labels:
    app: ecommerce
automountServiceAccountToken: false
